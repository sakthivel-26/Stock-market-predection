name: Daily Stock Alert

on:
  schedule:
    # 4:30 AM UTC = 10:00 AM IST (every weekday)
    - cron: '5 11 * * *'
  workflow_dispatch:  # Manual trigger button

jobs:
  stock-alert:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install yfinance pandas numpy ta joblib scikit-learn requests

      - name: Run stock alert
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        
        run: python cloud_alert.py
