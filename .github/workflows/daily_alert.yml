name: Daily Stock Alert

on:
  schedule:
    - cron: '0 5 * * *'   # 10:30 AM IST
  workflow_dispatch:

jobs:
  stock-alert:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: ⚡ Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('cloud_requirements.txt') }}

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r cloud_requirements.txt

      - name: 📂 Check model file
        run: |
          if [ ! -f stock_model.pkl ]; then
            echo "❌ stock_model.pkl missing!"
            exit 1
          fi

      - name: 🚀 Run bot
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        run: python cloud_alert.py
