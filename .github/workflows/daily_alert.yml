name: Daily Stock Alert

on:
  schedule:
    # 5:00 AM UTC = 10:30 AM IST
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  stock-alert:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r cloud_requirements.txt

      - name: Run stock alert
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
        run: python cloud_alert.py
